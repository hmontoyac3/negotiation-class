name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Firebase config into HTML files
        run: |
          CFG='window.firebaseConfig={apiKey:"${{ secrets.FIREBASE_API_KEY }}",authDomain:"${{ secrets.FIREBASE_AUTH_DOMAIN }}",databaseURL:"${{ secrets.FIREBASE_DATABASE_URL }}",projectId:"${{ secrets.FIREBASE_PROJECT_ID }}",storageBucket:"${{ secrets.FIREBASE_STORAGE_BUCKET }}",messagingSenderId:"${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",appId:"${{ secrets.FIREBASE_APP_ID }}"};'
          for f in submit_s1.html submit_s2.html 04_results_board.html; do
            sed -i "s|/\* FIREBASE_INLINE \*/|$CFG|g" "$f"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
